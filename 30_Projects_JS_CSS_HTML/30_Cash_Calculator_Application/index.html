<!DOCTYPE html>
<html>
<head>
  <title>Cash Calculator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">
        <h1>Cash Calculator</h1>        
        
        <div class="row">
          <input type="number" id="et200" class="cash-input" placeholder="200 TL">
          <span id="txt200" class="cash-text">0</span>
        </div>

        <div class="row">
          <input type="number" id="et100" class="cash-input" placeholder="100 TL">
          <span id="txt100" class="cash-text">0</span>
        </div>

        <div class="row">
          <input type="number" id="et50" class="cash-input" placeholder="50 TL">
          <span id="txt50" class="cash-text">0</span>
        </div>

        <div class="row">
          <input type="number" id="et20" class="cash-input" placeholder="20 TL">
          <span id="txt20" class="cash-text">0</span>
        </div>

        <div class="row">
          <input type="number" id="et10" class="cash-input" placeholder="10 TL">
          <span id="txt10" class="cash-text">0</span>
        </div>

        <div class="row">
          <input type="number" id="et5" class="cash-input" placeholder="5 TL">
          <span id="txt5" class="cash-text">0</span>
        </div>

        <div class="row">
          <input type="number" id="et1" class="cash-input" placeholder="1 TL">
          <span id="txt1" class="cash-text">0</span>
        </div>



        <div class="row">
          <button id="btnReset">Reset</button>
        </div>

        <div class="row result-part">
          <span id="txtFinalCash">Total Cash: 0</span>
          <span id="txtFinalCashInWords">Zero</span>
        </div>

    </div>
  
  <script src="script.js"></script>
</body>
</html>
